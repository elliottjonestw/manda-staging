<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Chinese reading speed">
  <defs>
    <linearGradient id="crs-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4338ca"/>
      <stop offset="0.55" stop-color="#5b21b6"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="crs-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.7" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="crs-vig" cx="0.5" cy="0.52" r="0.72">
      <stop offset="0.55" stop-color="#1e1b4b" stop-opacity="0"/>
      <stop offset="1" stop-color="#1e1b4b" stop-opacity="0.38"/>
    </radialGradient>
    <clipPath id="crs-clip"><rect width="800" height="450"/></clipPath>
  </defs>

  <g clip-path="url(#crs-clip)">
    <rect width="800" height="450" fill="url(#crs-bg)"/>
    <rect width="800" height="450" fill="url(#crs-glow)"/>

    <!-- Faint watermark characters for depth -->
    <g font-family="system-ui, 'PingFang SC', sans-serif" font-weight="700" fill="#ffffff" text-anchor="middle">
      <text x="712" y="168" font-size="300" opacity="0.06">读</text>
      <text x="92" y="486" font-size="250" opacity="0.05">速</text>
    </g>

    <!-- Speed / motion lines sweeping into the fixation point -->
    <g stroke="#ffffff" stroke-linecap="round">
      <line x1="150" y1="205" x2="252" y2="205" stroke-width="6" opacity="0.16"/>
      <line x1="104" y1="245" x2="252" y2="245" stroke-width="9" opacity="0.30"/>
      <line x1="168" y1="285" x2="252" y2="285" stroke-width="6" opacity="0.16"/>
    </g>

    <!-- RSVP fixation frame: pinyin, tick, word, tick (mirrors the app UI) -->
    <line x1="400" y1="66" x2="400" y2="92" stroke="#c7d2fe" stroke-width="3" stroke-linecap="round"/>
    <text x="400" y="126" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="500" fill="#c7d2fe" letter-spacing="2">kuài</text>
    <text x="400" y="225" text-anchor="middle" dominant-baseline="central" font-family="system-ui, 'PingFang SC', sans-serif" font-size="196" font-weight="600" fill="#ffffff">快</text>
    <line x1="400" y1="336" x2="400" y2="362" stroke="#c7d2fe" stroke-width="3" stroke-linecap="round"/>

    <!-- Reading progress bar -->
    <rect x="286" y="410" width="228" height="5" rx="2.5" fill="#ffffff" opacity="0.20"/>
    <rect x="286" y="410" width="118" height="5" rx="2.5" fill="#ffffff" opacity="0.85"/>
    <circle cx="404" cy="412.5" r="6" fill="#ffffff"/>

    <rect width="800" height="450" fill="url(#crs-vig)"/>
  </g>
</svg>
