    <style>
      /* Bootstrap loader shown until React mounts (and across the reload that a
         Cloud restore triggers), so there is no blank flash. Mirrors PageLoader. */
      #boot-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
      }
      html.dark #boot-loader {
        background: #1f2937;
      }
      #boot-loader > div {
        width: 2.5rem;
        height: 2.5rem;
        border-radius: 9999px;
        border: 4px solid #e5e7eb;
        border-top-color: #6366f1;
        animation: boot-spin 0.8s linear infinite;
      }
      html.dark #boot-loader > div {
        border-color: #374151;
        border-top-color: #6366f1;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <div id="root">
      <div id="boot-loader"><div></div></div>
    </div>
    <script>
      ;(function () {
        // App data lives in IndexedDB (async, unavailable pre-paint), so the
        // theme is mirrored to this localStorage key by useSettings.
        var theme
        try {
          theme = localStorage.getItem('manda-theme')
        } catch (e) {}
        var dark =
          theme === 'dark' ||
          (theme !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
      })()
    </script>
    <script>
      window.addEventListener('error', function (e) {
        // Ignore cross-origin errors — browser sanitises these as "Script error."
        // with no filename, so they cannot be diagnosed and are rarely from our code
        if (!e.filename || e.message === 'Script error.') return
        document.getElementById('root').innerHTML =
          '<div style="font-family:monospace;padding:16px;color:#c00;background:#fff;word-break:break-all">' +
          '<b>JS Error</b><br>' +
          (e.message || 'unknown') +
          '<br><small>' +
          (e.filename || '') +
          ':' +
          (e.lineno || '') +
          '</small></div>'
      })
      window.addEventListener('unhandledrejection', function (e) {
        document.getElementById('root').innerHTML =
          '<div style="font-family:monospace;padding:16px;color:#c00;background:#fff;word-break:break-all">' +
          '<b>Unhandled Promise Rejection</b><br>' +
          (e.reason?.message || String(e.reason) || 'unknown') +
          '</div>'
      })
    </script>
