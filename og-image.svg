  <!-- Large background character -->
  <text x="900" y="520" font-family="serif" font-size="520" fill="#f5f3ff" text-anchor="middle">读</text>

  <!-- Logo / wordmark -->
  <text x="80" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#111827">Manda</text>

